<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Endless Runner Template</title>
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
</head>
<body>
<!-- LittleJS Endless Runner Template v2 — uses LittleJS engine -->
<script src="littlejs.min.js"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════
//  ENDLESS RUNNER TEMPLATE (LittleJS edition)  —  Studio v2
//  Customise: GAME_TITLE, COLORS, obstacle shapes, speed curve
//  LittleJS handles: physics, rendering, input, particles, sound
// ═══════════════════════════════════════════════════════════

// ── Config (CUSTOMISE HERE) ──────────────────────────────────
const GAME_TITLE  = 'ENDLESS RUNNER';
const COLORS = {
  sky:      new Color(0.04, 0.04, 0.12),
  ground:   new Color(0.12, 0.23, 0.37),
  player:   new Color(0.02, 0.71, 0.84),
  obstacle: new Color(0.66, 0.33, 0.97),
  coin:     new Color(1, 0.85, 0),
  particle: new Color(0.02, 0.71, 0.84),
};
const GROUND_Y    = -4;          // Y position of ground surface
const RUNNER_X    = -7;          // fixed X position of runner
const BASE_SPEED  = 6;           // starting obstacle scroll speed
const SPEED_INC   = 0.03;        // speed per second increase
const JUMP_VEL    = 0.28;        // jump force
const GAP_MIN     = 5;           // min tile gap between obstacles
const GAP_RANGE   = 8;           // random extra gap

// ── CrazyGames SDK ───────────────────────────────────────────
(async () => { try { await window.CrazyGames?.SDK?.init(); } catch(e){} })();
let deathCount = 0;
function cgStart() { try { window.CrazyGames?.SDK?.game?.gameplayStart();  } catch(e){} }
function cgStop()  { try { window.CrazyGames?.SDK?.game?.gameplayStop();   } catch(e){} }

// ── Sounds (LittleJS ZzFX built-in) ─────────────────────────
const sndJump    = new Sound([0.5,,200,.01,.1,.3,1,1,,,,,,1]);
const sndCoin    = new Sound([1.5,,880,.01,.05,.1,1,2]);
const sndDie     = new Sound([1,,400,.01,.1,.3,4,1,,,,,,,.1]);

// ── Game State ───────────────────────────────────────────────
const ST = { TITLE:0, PLAY:1, DEAD:2 };
let gameState, runner, obstacles, coins, dist, speed, score;
let bestScore = +localStorage.getItem(GAME_TITLE+'_b') || 0;
let nextObstIn, graceTimer;

// ── Runner class ─────────────────────────────────────────────
class Runner extends EngineObject {
  constructor() {
    super(vec2(RUNNER_X, GROUND_Y + 0.6), vec2(0.8, 1));
    this.color        = COLORS.player;
    this.gravityScale = 1;
    this.setCollision(true, false);
  }
  update() {
    super.update();
    // Clamp to ground
    if (this.pos.y <= GROUND_Y + 0.5) {
      this.pos.y       = GROUND_Y + 0.5;
      this.velocity.y  = 0;
      this.groundObject = true;
    }
    // Visual squash/stretch
    const stretch = this.velocity.y > 0 ? vec2(0.7, 1.3)
                  : this.velocity.y < -0.1 ? vec2(1.2, 0.8)
                  : vec2(1);
    this.size = stretch;
  }
  render() {
    // Body glow
    drawRect(this.pos, this.size, this.color);
    // Eye
    drawRect(this.pos.add(vec2(0.2, 0.2)), vec2(0.18, 0.18), new Color(1,1,1));
    drawRect(this.pos.add(vec2(0.26, 0.2)), vec2(0.1, 0.1), new Color(0,0,0));
  }
}

// ── Obstacle class ────────────────────────────────────────────
class Obstacle extends EngineObject {
  constructor(x) {
    const h = 0.6 + rand(0.8);
    super(vec2(x, GROUND_Y + h/2 + 0.1), vec2(0.55, h));
    this.color        = COLORS.obstacle;
    this.mass         = 0;  // kinematic
    this.gravityScale = 0;
    this.setCollision(true, false);
    this._speed       = speed;
  }
  update() {
    this.pos.x -= this._speed * timeDelta;
    if (this.pos.x < RUNNER_X - 2 && !this.scored) {
      this.scored = true;
      score++;
      sndCoin.play(this.pos);
    }
    if (this.pos.x < -20) this.destroy();
  }
  render() {
    drawRect(this.pos, this.size, this.color);
    // Spiky top
    for (let i = -1; i <= 1; i++) {
      drawRect(this.pos.add(vec2(i * 0.2, this.size.y/2 + 0.12)),
               vec2(0.12, 0.25), COLORS.obstacle);
    }
  }
}

// ── Coin class ────────────────────────────────────────────────
class Coin extends EngineObject {
  constructor(x) {
    super(vec2(x, GROUND_Y + 1.5 + rand(1.2)), vec2(0.4, 0.4));
    this.color        = COLORS.coin;
    this.gravityScale = 0;
    this.mass         = 0;
    this._speed       = speed;
    this._t           = 0;
  }
  update() {
    this.pos.x -= this._speed * timeDelta;
    this._t += timeDelta * 4;
    this.pos.y += Math.sin(this._t) * 0.005;
    if (this.pos.x < -20) this.destroy();
    // Collect
    if (gameState === ST.PLAY && runner &&
        this.pos.distanceSquared(runner.pos) < 0.6) {
      score += 5;
      sndCoin.play(this.pos);
      new ParticleEmitter(this.pos, 0, 0.3, 0.08, 12, PI,
        COLORS.coin, COLORS.coin.lerp(new Color(1,1,1),0.5), 0,0,0.3,0.1,0.1,1,1);
      this.destroy();
    }
  }
  render() {
    drawRect(this.pos, this.size, this.color);
    drawRect(this.pos, vec2(0.15, 0.15), new Color(1,1,1,0.6));
  }
}

// ── Input helper ─────────────────────────────────────────────
function doJump() {
  if (!runner || !runner.groundObject) return;
  runner.velocity.y = JUMP_VEL;
  runner.groundObject = false;
  sndJump.play(runner.pos);
  new ParticleEmitter(runner.pos, 0, 0.4, 0.1, 8, PI,
    COLORS.particle, COLORS.particle, 0,0,0.3,0.08,0.1,1,1);
}

function handleInput() {
  if (gameState === ST.TITLE || gameState === ST.DEAD) {
    gameState = ST.PLAY;
    initGame();
  } else if (gameState === ST.PLAY) {
    doJump();
  }
}

// ── Game lifecycle ────────────────────────────────────────────
function initGame() {
  engineObjectsDestroy();
  runner       = new Runner();
  obstacles    = [];
  coins        = [];
  dist         = 0;
  speed        = BASE_SPEED;
  score        = 0;
  nextObstIn   = GAP_MIN + rand(GAP_RANGE, 0)|0;
  graceTimer   = new Timer(1.5);
  cameraPos    = vec2(0, -1);
  cameraScale  = 55;
  cgStart();
}

function spawnObstacle() {
  const o = new Obstacle(20);
  obstacles.push(o);
  if (rand() < 0.5) new Coin(20 + rand(3, 1));
  nextObstIn = GAP_MIN + rand(GAP_RANGE, 0)|0;
}

function die() {
  if (gameState !== ST.PLAY) return;
  gameState = ST.DEAD;
  bestScore = Math.max(bestScore, score);
  localStorage.setItem(GAME_TITLE+'_b', bestScore);
  sndDie.play(runner.pos);
  new ParticleEmitter(runner.pos, 0, 1, 0.3, 30, PI,
    COLORS.player, new Color(1,0.3,0.3), 0,0,0.8,0.15,0.2,1,1);
  runner.color = new Color(1,0.2,0.2,0.5);
  deathCount++;
  cgStop();
  if (deathCount % 3 === 0) {
    try { window.CrazyGames?.SDK?.ad?.showAd('midgame'); } catch(e){}
  }
}

// ── LittleJS Hooks ────────────────────────────────────────────
function gameInit() {
  gameState = ST.TITLE;
  cameraPos = vec2(0,-1);
  cameraScale = 55;
}

function gameUpdate() {
  if (keyWasPressed('Space') || keyWasPressed('ArrowUp') || mouseWasPressed(0))
    handleInput();

  if (gameState !== ST.PLAY) return;
  if (!graceTimer.elapsed()) return; // grace period

  dist  += timeDelta;
  speed  = Math.min(BASE_SPEED * 2.5, BASE_SPEED + dist * SPEED_INC);

  nextObstIn -= speed * timeDelta;
  if (nextObstIn <= 0) spawnObstacle();

  // Collision detection — check runner vs each obstacle
  for (const o of engineObjects) {
    if (!(o instanceof Obstacle)) continue;
    if (runner && isOverlapping(runner.pos, runner.size, o.pos, o.size.subtract(vec2(0.1)))) {
      die(); break;
    }
  }

  if (runner && runner.pos.y < GROUND_Y - 2) die();
}

function gameUpdatePost() {}

function gameRender() {
  // Ground
  drawRect(vec2(0, GROUND_Y - 0.25), vec2(40, 0.5), COLORS.ground);
  // Ground dashes
  const dashOff = (dist * speed * 0.3) % 3;
  for (let i = -15; i < 15; i++) {
    drawRect(vec2(i * 3 - dashOff % 3, GROUND_Y + 0.02),
             vec2(1.5, 0.04), new Color(1,1,1,0.07));
  }
  // Parallax bg buildings
  for (let i = 0; i < 8; i++) {
    const bx = ((i * 5.3 - dist * 0.8) % 40) - 20;
    const bh = 1.5 + (i % 3);
    drawRect(vec2(bx, GROUND_Y - bh/2 - 0.5), vec2(1.8, bh),
             new Color(0.08, 0.08, 0.18));
  }
}

function gameRenderPost() {
  if (gameState === ST.TITLE) {
    drawText(GAME_TITLE, vec2(0, 1), 0.9, COLORS.player, 0.1);
    drawText('tap / space to start', vec2(0, 0.1), 0.45, new Color(1,1,1,0.6), 0.06);
    if (bestScore) drawText('best: '+bestScore, vec2(0,-0.5), 0.38, new Color(1,0.85,0,0.6), 0.05);
    return;
  }
  if (gameState === ST.DEAD) {
    drawText('GAME OVER', vec2(0, 1.2), 0.9, new Color(1,0.2,0.2), 0.1);
    drawText('score: '+score, vec2(0, 0.3), 0.55, new Color(1,1,1), 0.07);
    drawText('best: '+bestScore, vec2(0,-0.2), 0.42, new Color(1,0.85,0,0.8), 0.05);
    drawText('tap to retry', vec2(0,-0.8), 0.42, new Color(0.3,1,0.5,
      0.5+Math.sin(time*4)*0.5), 0.05);
    return;
  }
  // HUD
  drawText(''+score, vec2(0, 3.5), 0.7, new Color(1,1,1,0.9), 0.09);
  const spd = (speed/BASE_SPEED).toFixed(1);
  drawText('x'+spd, vec2(7, 3.5), 0.38,
    speed > BASE_SPEED*2 ? new Color(1,0.3,0.3) : new Color(0.5,1,0.5,0.7), 0.05);
}

setCanvasClearColor(new Color(0.03, 0.03, 0.06));
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script>
</body>
</html>
